name: lector

services:
  mongodb:
    image: public.ecr.aws/docker/library/mongo:8.0.14
    restart: unless-stopped
    ports:
      - "127.0.0.1:${MONGODB_HOST_PORT:-27017}:27017"
    volumes:
      - mongodb-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 10

  agent:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      MONGODB_URL: mongodb://mongodb:27017/lector
    ports:
      - "127.0.0.1:${AGENT_HOST_PORT:-8000}:8000"
    depends_on:
      mongodb:
        condition: service_healthy

  gateway:
    build:
      context: .
      dockerfile: lector-api/Dockerfile
    restart: unless-stopped
    environment:
      LECTOR_AGENT_BASE_URL: http://agent:8000
      LECTOR_AGENT_WS_BASE_URL: ws://agent:8000
      LECTOR_API_KEY: ${LECTOR_API_KEY:-local-dev-only}
      LECTOR_RATE_CAPACITY: ${LECTOR_RATE_CAPACITY:-60}
      LECTOR_RATE_REFILL_PER_MINUTE: ${LECTOR_RATE_REFILL_PER_MINUTE:-60}
    ports:
      - "127.0.0.1:8080:8080"
    depends_on:
      - agent

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    restart: unless-stopped
    environment:
      LECTOR_API_KEY: ${LECTOR_API_KEY:-local-dev-only}
      FRONTEND_USERNAME: ${FRONTEND_USERNAME:-lector}
      FRONTEND_PASSWORD: ${FRONTEND_PASSWORD:-local-dev-only}
    ports:
      - "127.0.0.1:5173:80"
    depends_on:
      - gateway

volumes:
  mongodb-data:
