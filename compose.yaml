name: lector

services:
  mongodb:
    image: mongo:8.0.14
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 10

  opensearch:
    image: opensearchproject/opensearch:3.6.0
    restart: unless-stopped
    environment:
      discovery.type: single-node
      plugins.security.disabled: "true"
      OPENSEARCH_JAVA_OPTS: "-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
      - "9600:9600"
    volumes:
      - opensearch-data:/usr/share/opensearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9200/_cluster/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 20

  tower:
    build:
      context: .
      dockerfile: services/tower/Dockerfile
    restart: unless-stopped
    environment:
      TOWER_MODEL: BAAI/bge-m3
    ports:
      - "8001:8001"
    volumes:
      - huggingface-cache:/models/huggingface
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 30s
      timeout: 10s
      retries: 30

  agent:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      MONGODB_URL: mongodb://mongodb:27017/lector
      OPENSEARCH_HOST: opensearch
      OPENSEARCH_PORT: "9200"
      TOWER_USER_ENDPOINT: http://tower:8001/encode/user
      TOWER_QUERY_ENDPOINT: http://tower:8001/encode/query
      CATEGORY_KB_INDEX: lector_category_kb
      CATEGORY_KB_SEARCH_PIPELINE: lector_hybrid_pipeline
    ports:
      - "8000:8000"
    depends_on:
      mongodb:
        condition: service_healthy
      opensearch:
        condition: service_healthy
      tower:
        condition: service_healthy

volumes:
  mongodb-data:
  opensearch-data:
  huggingface-cache:
